services:
  postgres:
    image: postgres:18.3
    container_name: jitterbit-postgres
    environment:
      POSTGRES_DB: jitterbit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - jitterbit_postgres_data:/var/lib/postgresql
volumes:
  jitterbit_postgres_data:
